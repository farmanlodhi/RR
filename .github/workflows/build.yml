name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME:     /home/runner/.buildozer/android/platform/android-sdk
      JAVA_HOME:        /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl wget \
            python3-pip python3-dev \
            build-essential \
            libssl-dev libffi-dev \
            libsqlite3-dev \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake lld ccache \
            openjdk-17-jdk \
            libltdl-dev libgdbm-dev liblzma-dev libreadline-dev \
            libfreetype6-dev libpng-dev

      - name: Force Java 17 as default
        run: |
          sudo update-java-alternatives --set java-1.17.0-openjdk-amd64
          java -version
          javac -version

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer "cython<3"

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install Android SDK cmdline-tools
        run: |
          SDK_ROOT="$ANDROID_SDK_ROOT"
          CMDLINE_DIR="$SDK_ROOT/cmdline-tools"
          SDKMANAGER="$CMDLINE_DIR/latest/bin/sdkmanager"

          if [ -f "$SDKMANAGER" ]; then
            echo "sdkmanager already present, skipping download."
          else
            echo "Downloading Android cmdline-tools..."
            mkdir -p "$CMDLINE_DIR"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-raw
            mv /tmp/cmdline-tools-raw/cmdline-tools "$CMDLINE_DIR/latest"
            rm -rf /tmp/cmdline-tools-raw /tmp/cmdline-tools.zip
          fi

          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$CMDLINE_DIR/latest/bin/sdkmanager" "$SDK_ROOT/tools/bin/sdkmanager" || true
          java -version
          ls -la "$SDK_ROOT/tools/bin/sdkmanager"

      - name: Accept Android SDK licences
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true

          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' \
            > "$ANDROID_SDK_ROOT/licenses/intel-android-extra-license"

      - name: Install required SDK packages
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "ndk;25.2.9519653"

      - name: Build APK
        # pipefail so that a Buildozer failure isn't hidden by tee
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Show full build log on failure
        if: always()
        run: |
          echo "============================================================"
          echo "  FULL BUILD LOG"
          echo "============================================================"
          cat build.log || true

      - name: Locate APK and diagnose missing output
        if: always()
        run: |
          echo "=== bin/ directory ==="
          ls -la bin/ 2>/dev/null || echo "bin/ does not exist"

          echo ""
          echo "=== All APK files anywhere in workspace ==="
          find . -name "*.apk" 2>/dev/null || echo "None found"

          echo ""
          echo "=== python-for-android dist directory ==="
          find ~/.buildozer -name "*.apk" 2>/dev/null | head -20 || echo "None found in .buildozer"

          echo ""
          echo "=== Gradle build output ==="
          find ~/.buildozer -name "build" -type d 2>/dev/null | head -10

          echo ""
          echo "=== Last ERROR lines in log ==="
          grep -i "error\|exception\|failed\|traceback" build.log | tail -40 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: receipt-reader-apk
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
