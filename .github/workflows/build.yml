name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # lets you trigger it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04     # Buildozer is well-tested on 22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. System dependencies ────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            python3-pip python3-dev \
            build-essential \
            libssl-dev libffi-dev \
            libsqlite3-dev \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake \
            lld \
            ccache \
            openjdk-17-jdk

      # ── 4. Buildozer + Cython ─────────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      # ── 5. Cache Android SDK/NDK/p4a (saves ~20 min on re-runs) ──
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Build APK ──────────────────────────────────────────────
      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      # ── 7. Upload APK as artifact ─────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-reader-apk
          path: bin/*.apk
          if-no-files-found: error

      # ── 8. Upload build log (always, even on failure) ─────────────
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
