name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl \
            python3-pip python3-dev \
            build-essential \
            libssl-dev libffi-dev \
            libsqlite3-dev \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake lld ccache \
            openjdk-17-jdk \
            libltdl-dev libgdbm-dev liblzma-dev libreadline-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer "cython<3"

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── THE FIX: pre-accept all Android SDK licences by writing the
      #    licence hash files that sdkmanager checks for. This bypasses
      #    the interactive prompt entirely. ───────────────────────────
      - name: Accept Android SDK licences
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          # android-sdk-license  (covers platform-tools, build-tools, platforms)
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\n d56f5187479451eabf01fb78af6dfcb131a6481e\n 24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          # android-sdk-preview-license
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          # intel-android-extra-license
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' \
            > ~/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license
          echo "Licence files written:"
          ls -la ~/.buildozer/android/platform/android-sdk/licenses/

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Find APK
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== Contents of bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
          echo ""
          echo "=== Last 50 lines of build log ==="
          tail -50 build.log || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: receipt-reader-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
